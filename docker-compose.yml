services:
  db:
    image: postgres:14
    container_name: paws-db
    restart: always
    environment:
      POSTGRES_DB: myvet_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_postgres_password
    ports:
      - "5432:5432"
    volumes:
      - paws_db_data:/var/lib/postgresql/data
      - ./database/db.sql:/docker-entrypoint-initdb.d/db.sql
  app:
    build: .
    container_name: paws-app
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: myvet_db
      DB_USER: postgres
      DB_PASSWORD: your_postgres_password
      DB_SSL: "false"
      DB_AUTO_INIT: "false"
      PORT: 3000
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      # Agrega aquí el resto de variables de entorno necesarias
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - .:/app
volumes:
  paws_db_data:
