<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyVet - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-button { @apply px-4 py-2 rounded-t-lg cursor-pointer transition; }
        .tab-button.active { @apply bg-purple-500 text-white; }
        .tab-button:not(.active) { @apply bg-gray-200 text-gray-700 hover:bg-gray-300; }
        table { @apply w-full border-collapse; }
        th { @apply bg-purple-500 text-white p-3 text-left; }
        td { @apply border-b p-3; }
        tr:hover { @apply bg-purple-50; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-6">
        <header class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h1 class="text-3xl font-bold text-purple-600">🐾 MyVet - Panel de Administración</h1>
            <p class="text-gray-600 mt-2">Visualiza todos los datos de la base de datos</p>
        </header>

        <!-- Tabs -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="flex gap-1 p-2 bg-gray-100">
                <button class="tab-button active" onclick="showTab('clientes')">👥 Clientes</button>
                <button class="tab-button" onclick="showTab('clinics')">🏥 Veterinarias</button>
                <button class="tab-button" onclick="showTab('servicios')">💊 Servicios</button>
                <button class="tab-button" onclick="showTab('mascotas')">🐕 Mascotas</button>
                <button class="tab-button" onclick="showTab('visitas')">📋 Visitas</button>
                <button class="tab-button" onclick="showTab('emergencias')">🚨 Emergencias</button>
            </div>

            <!-- Content -->
            <div class="p-6">
                <div id="loading" class="text-center py-8">
                    <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-purple-500"></div>
                    <p class="mt-4 text-gray-600">Cargando datos...</p>
                </div>
                
                <div id="content" class="hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h2 id="table-title" class="text-2xl font-bold text-gray-800"></h2>
                        <button onclick="refreshData()" class="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600 transition">
                            🔄 Refrescar
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <div id="table-container"></div>
                    </div>
                    <div id="count" class="mt-4 text-gray-600 font-semibold"></div>
                </div>

                <div id="error" class="hidden text-red-600 p-4 bg-red-50 rounded"></div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'clientes';
        
        const endpoints = {
            clientes: { url: '/api/clientes', title: 'Clientes Registrados' },
            clinics: { url: '/api/clinics', title: 'Veterinarias' },
            servicios: { url: '/api/servicios', title: 'Servicios' },
            mascotas: { url: '/api/mascotas', title: 'Mascotas' },
            visitas: { url: '/api/visitas', title: 'Visitas' },
            emergencias: { url: '/api/emergencias', title: 'Emergencias' }
        };

        function showTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadData(tab);
        }

        async function loadData(tab) {
            const loadingEl = document.getElementById('loading');
            const contentEl = document.getElementById('content');
            const errorEl = document.getElementById('error');
            
            loadingEl.classList.remove('hidden');
            contentEl.classList.add('hidden');
            errorEl.classList.add('hidden');

            try {
                const response = await fetch(endpoints[tab].url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                document.getElementById('table-title').textContent = endpoints[tab].title;
                document.getElementById('count').textContent = `Total: ${data.length} registro(s)`;
                
                if (data.length === 0) {
                    document.getElementById('table-container').innerHTML = 
                        '<p class="text-gray-500 text-center py-8">No hay datos disponibles</p>';
                } else {
                    renderTable(data);
                }
                
                loadingEl.classList.add('hidden');
                contentEl.classList.remove('hidden');
            } catch (error) {
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
                errorEl.textContent = `Error al cargar datos: ${error.message}`;
            }
        }

        function renderTable(data) {
            if (!data || data.length === 0) return;
            
            const headers = Object.keys(data[0]);
            
            let html = '<table>';
            html += '<thead><tr>';
            headers.forEach(header => {
                html += `<th>${header}</th>`;
            });
            html += '</tr></thead>';
            
            html += '<tbody>';
            data.forEach(row => {
                html += '<tr>';
                headers.forEach(header => {
                    let value = row[header];
                    if (value === null) value = '<span class="text-gray-400 italic">null</span>';
                    else if (typeof value === 'boolean') value = value ? '✅' : '❌';
                    else if (header === 'password') value = '••••••••';
                    html += `<td>${value}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody>';
            html += '</table>';
            
            document.getElementById('table-container').innerHTML = html;
        }

        function refreshData() {
            loadData(currentTab);
        }

        // Cargar datos iniciales
        window.addEventListener('DOMContentLoaded', () => {
            loadData('clientes');
        });
    </script>
</body>
</html>
