<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--tailwind display CDN-->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Busqueda | medellinVet</title>
    <!--root tailwind-->
    <style type="text/tailwindcss">
        @theme {
        --color-purple: #cdb4db;
        --color-green-light: #C8E6C9;
        --color-pink: #ffafcc;
        --color-blue-light: #bde0fe;
        --color-blue: #a2d2ff;

        --color-white: #ffffff;
        --color-gray: #6b7280;
    }
    </style>
</head>
<body class="min-h-screen bg-white">
    <header class="h-20 border-b border-gray-200 flex items-center justify-between px-6 ">
        <div class="flex items-center gap-2 ">
            <span class="font-semibold">Medellin<span class="text-purple font-bold">Vet</span> </span>
        </div>
        <nav class="hidden md:flex gap-6 text-sm text-gray">
            <a href="#" class="hover:text-black">Home</a>
            <a href="#" class="text-black font-bold border-b-2 border-pink pb-1">Find Vets</a>
            <a href="#" class="hover:text-black">Services</a>
        </nav>
        <!--Actions-->
        <div class="flex items-center gap-4 text-sm">
            <a href="#" class="text-gray hover:text-black">Login</a>
            <a href="#" class="px-4 py-2 rounded-full bg-purple text-white hover:opacity-90">Entrar como Vet</a>
        </div>
    </header>
    <main class="flex min-h-screen">
        <!--Left panel-->
        <aside class="w-full md:w-1/3 border-r-2 border-gray-200 p-6">
            <h1 class="text-2xl font-bold mb-4">Encuentra la mejor vet</h1>
            <!--Search-->
            <div class="relative mb-4">
                <input type="text" placeholder="Search by near or service"
                class="w-full px-4 py-3 rounded-xl bg-blue-light/40 outline-none focus:ring-2 focus:ring-blue">
                <!--lupa icon-->
                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray"></span>
            </div>
            <!--Filters-->
            <div class="flex flex-wrap gap-2 mb-6 text-xs">
                <button class="px-3 py-1 rounded-full bg-pink text-white">All</button>
                <button class="px-3 py-1 rounded-full border">24h</button>
                <button class="px-3 py-1 rounded-full border">urgencias</button>
                <button class="px-3 py-1 rounded-full border">Poblado</button>
                <button class="px-3 py-1 rounded-full border">Laureles</button>
            </div>
            <!--List-->
            <div class="space-y-4">
                <!--Card-->
                <div class="flex items-center gap-3 p-3 rounded-2xl border shadow-sm">
                    <div class="w-12 h-12 rounded-full bg-purple/40 flex items-center justify-center text-xs">photo</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center">
                            <h3 class="font-semibold text-sm">Clinica san juan pet</h3>
                            <span class="text-xs bg-pink-light text-pink px-2 py-0.5 rounded-full">4.9</span>
                        </div>
                        <p class="text-xs text-gray">El Poblado, Medellín</p>
                        <div class="flex gap-2 mt-1">
                            <span class="text-[10px] bg-blue-light/60 px-2 py-0.5 rounded-full">Urgencias</span>
                            <span class="text-[10px] bg-green-light/60 px-2 py-0.5 rounded-full">Cirugía</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>
</body>
</html>
